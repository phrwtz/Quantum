services:
  - type: web
    name: qubit-lab
    runtime: static
    buildCommand: npm ci && npm run build:static
    staticPublishPath: dist
    envVars:
      - key: PUBLIC_BACKEND_URL
        sync: false

  - type: web
    name: qubit-lab-backend
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run backend
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PUBLIC_APP_URL
        sync: false
      - key: MAIL_DELIVERY_PROVIDER
        value: resend
      - key: MAIL_FROM
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: MAIL_SEND_TIMEOUT_MS
        value: 10000
      - key: RESEND_API_KEY
        sync: false
