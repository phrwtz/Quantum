services:
  - type: web
    name: qubit-lab-backend
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run backend
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PUBLIC_APP_URL
        sync: false
      - key: MAIL_DELIVERY_PROVIDER
        value: resend
      - key: MAIL_FROM
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false
